<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Carga de Calificativos</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 8px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verificación de Carga</h1>
        <div id="resultado"></div>
    </div>

    <script>
        let html = '<h2>Estado del localStorage:</h2>';
        
        // Verificar si hay datos
        const datos = localStorage.getItem('ie_calificativos_v2');
        
        if (datos) {
            try {
                const parsed = JSON.parse(datos);
                html += `<p class="success">✅ Datos encontrados en localStorage</p>`;
                html += `<p>Total de calificativos: <strong>${parsed.length}</strong></p>`;
                
                if (parsed.length > 0) {
                    html += `<h3>Primer calificativo:</h3>`;
                    html += `<pre>${JSON.stringify(parsed[0], null, 2)}</pre>`;
                    
                    // Contar por competencia
                    const porComp = {};
                    parsed.forEach(cal => {
                        const comp = cal.competenciaId;
                        porComp[comp] = (porComp[comp] || 0) + 1;
                    });
                    
                    html += `<h3>Por competencia:</h3>`;
                    html += `<pre>${JSON.stringify(porComp, null, 2)}</pre>`;
                    
                    // Contar por calificativo
                    const porCalif = {};
                    parsed.forEach(cal => {
                        const c = cal.calificativo;
                        porCalif[c] = (porCalif[c] || 0) + 1;
                    });
                    
                    html += `<h3>Por calificativo:</h3>`;
                    html += `<pre>${JSON.stringify(porCalif, null, 2)}</pre>`;
                }
            } catch (e) {
                html += `<p class="error">❌ Error al parsear datos: ${e.message}</p>`;
            }
        } else {
            html += `<p class="error">❌ No hay datos en localStorage['ie_calificativos_v2']</p>`;
            html += `<p class="info">Claves disponibles en localStorage:</p>`;
            html += `<pre>`;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const size = localStorage.getItem(key).length;
                html += `${key} (${size} bytes)\n`;
            }
            html += `</pre>`;
        }
        
        document.getElementById('resultado').innerHTML = html;
    </script>
</body>
</html>
