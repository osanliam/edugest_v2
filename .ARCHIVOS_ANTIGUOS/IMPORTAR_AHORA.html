<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Importar 1249 Estudiantes + 6997 Notas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; padding: 15px; border-radius: 6px; margin: 15px 0; }
        .section { margin: 30px 0; padding: 20px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #667eea; }
        .section h2 { color: #333; margin-bottom: 15px; font-size: 18px; }
        button {
            padding: 14px 32px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            margin: 10px 5px 10px 0;
            transition: all 0.3s;
        }
        button:hover { background: #218838; transform: translateY(-2px); }
        textarea {
            width: 100%;
            height: 220px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin: 15px 0;
        }
        .status {
            padding: 15px;
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            border-radius: 6px;
            margin: 15px 0;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #d4edda; border-left-color: #28a745; color: #155724; }
        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #ddd;
            text-align: center;
            display: inline-block;
            margin: 10px 15px 10px 0;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Importar Datos Completos</h1>

        <div class="success">
            ✅ 1249 estudiantes + 12 maestros + 6997 notas listos
        </div>

        <div class="section">
            <div class="stat-box">
                <div class="stat-number">1249</div>
                <div class="stat-label">Estudiantes</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">12</div>
                <div class="stat-label">Maestros</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">6997</div>
                <div class="stat-label">Notas</div>
            </div>
        </div>

        <div class="section">
            <h2>Copia este código:</h2>
            <textarea id="codigo" readonly></textarea>
            <button onclick="copiarCodigo()">📋 Copiar Código</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        const codigo = `const importarDatos = async () => {
    try {
        console.log('🔄 Iniciando importación de datos...');

        // Fetch desde el JSON en la carpeta instrumentos
        const response = await fetch('./sistemita_datos_final.json');
        if (!response.ok) throw new Error('No se pudo cargar el archivo JSON: ' + response.status);

        const datos = await response.json();

        // Crear objeto para localStorage
        const objetoDatos = {
            "version": "Sistemita_Nuevo_v2.0",
            "timestamp": new Date().toISOString(),
            "origenDatos": "EduGest_Backup_2026-04-19",
            "resumen": {
                "totalEstudiantes": datos.estudiantes?.length || 1249,
                "totalMaestros": datos.maestros?.length || 12,
                "totalNotas": datos.notas?.length || 6997
            },
            "estudiantes": datos.estudiantes || [],
            "maestros": datos.maestros || [],
            "notas": datos.notas || [],
            "competenciasMinedu": datos.competenciasMinedu || ["Lee textos diversos", "Produce textos escritos", "Interactúa oralmente"]
        };

        // Guardar en localStorage
        localStorage.setItem('sistemita_datos', JSON.stringify(objetoDatos));

        console.log('✅ IMPORTACIÓN EXITOSA');
        console.log('📊 Resumen:');
        console.log('   Estudiantes:', objetoDatos.resumen.totalEstudiantes);
        console.log('   Maestros:', objetoDatos.resumen.totalMaestros);
        console.log('   Notas:', objetoDatos.resumen.totalNotas);

        if (objetoDatos.estudiantes.length > 0) {
            console.log('📝 Primer estudiante:', objetoDatos.estudiantes[0].nombre);
        }
        if (objetoDatos.maestros.length > 0) {
            console.log('👨‍🏫 Primer maestro:', objetoDatos.maestros[0].nombre);
        }

        alert('✅ Importado con éxito\\n\\nEstudiantes: ' + objetoDatos.resumen.totalEstudiantes + '\\nMaestros: ' + objetoDatos.resumen.totalMaestros + '\\nNotas: ' + objetoDatos.resumen.totalNotas + '\\n\\nRecargando...');

        setTimeout(() => location.reload(), 1500);
    } catch(e) {
        console.error('❌ Error:', e.message);
        console.error('Stack:', e.stack);
        alert('❌ Error: ' + e.message);
    }
};

importarDatos();`;

        document.getElementById('codigo').value = codigo;

        function copiarCodigo() {
            const textarea = document.getElementById('codigo');
            textarea.select();
            document.execCommand('copy');
            mostrarEstado('✅ Código copiado', 'success');
        }

        function mostrarEstado(mensaje, tipo) {
            const status = document.getElementById('status');
            status.className = 'status show ' + tipo;
            status.textContent = mensaje;
            setTimeout(() => status.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
