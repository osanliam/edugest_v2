<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Valorativa</title>
    <script src="calculos.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 { font-size: 28px; margin-bottom: 10px; }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-guardar { background: #4CAF50; color: white; }
        .btn-guardar:hover { background: #45a049; }
        .btn-limpiar { background: #FF9800; color: white; }
        .btn-limpiar:hover { background: #e68900; }
        .btn-cerrar { background: #f44336; color: white; }
        .btn-cerrar:hover { background: #da190b; }

        .content { padding: 30px; }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 2px solid #38f9d7;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #38f9d7;
            box-shadow: 0 0 0 3px rgba(56, 249, 215, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .criterio-row {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .criterio-nombre {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .escala-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .escala-item {
            text-align: center;
        }

        .escala-item label {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            font-weight: normal;
            font-size: 12px;
            cursor: pointer;
        }

        .escala-item input[type="radio"] {
            margin-bottom: 6px;
            cursor: pointer;
            width: auto;
        }

        .escala-nivel {
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            background: white;
            border: 1px solid #ddd;
        }

        .escala-c { background: #ffebee; }
        .escala-b { background: #fff3e0; }
        .escala-a { background: #e8f5e9; }
        .escala-ad { background: #e3f2fd; }

        .resultado-section {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .resultado-section h3 {
            border: none;
            margin-bottom: 15px;
        }

        .resultado-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .resultado-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .resultado-item strong {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .resultado-item .valor {
            font-size: 24px;
            font-weight: bold;
            color: #38f9d7;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            button { width: 100%; }
            .escala-container { grid-template-columns: repeat(2, 1fr); }
            .resultado-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Escala Valorativa</h1>
            <p>Evaluación gradual de desempeños en escala</p>
        </div>

        <div class="controls">
            <button class="btn-guardar" onclick="guardar()">💾 Guardar</button>
            <button class="btn-limpiar" onclick="limpiar()">🗑️ Limpiar</button>
            <button class="btn-cerrar" onclick="cerrar()">❌ Cerrar</button>
        </div>

        <div class="content">
            <div class="form-section">
                <h3>Información General</h3>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Estudiante</label>
                        <input type="text" id="estudiante" placeholder="Nombre">
                    </div>
                    <div class="form-group">
                        <label>Competencia</label>
                        <input type="text" id="competencia" placeholder="Ej: Lee textos diversos">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="fecha">
                    </div>
                    <div class="form-group">
                        <label>Docente</label>
                        <input type="text" id="docente" placeholder="Nombre">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>5 Criterios en Escala</h3>
                <p style="color: #666; font-size: 13px; margin-bottom: 15px;">
                    Selecciona el nivel de desempeño: C (Inicio) | B (En Proceso) | A (Logro) | AD (Destacado)
                </p>

                <div id="criterios-container">
                    <!-- Se genera dinámicamente -->
                </div>
            </div>

            <div class="form-section">
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="observaciones" placeholder="Notas sobre los desempeños evaluados"></textarea>
                </div>
            </div>

            <div class="resultado-section">
                <h3>Resultado Calculado</h3>
                <div class="resultado-grid">
                    <div class="resultado-item">
                        <strong>Calificativo</strong>
                        <div class="valor" id="resultado-calif">--</div>
                    </div>
                    <div class="resultado-item">
                        <strong>% Logro</strong>
                        <div class="valor" id="resultado-pct">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const fecha = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').value = fecha;
            generarCriterios();
        });

        function generarCriterios() {
            const container = document.getElementById('criterios-container');
            container.innerHTML = '';

            for (let i = 1; i <= 5; i++) {
                const div = document.createElement('div');
                div.className = 'criterio-row';
                div.innerHTML = `
                    <div class="criterio-nombre">Criterio ${i}</div>
                    <div class="escala-container">
                        <div class="escala-item">
                            <label>
                                <input type="radio" name="criterio${i}" value="C"
                                       onchange="calcularResultado()">
                                <span class="escala-nivel escala-c">C<br>Inicio</span>
                            </label>
                        </div>
                        <div class="escala-item">
                            <label>
                                <input type="radio" name="criterio${i}" value="B"
                                       onchange="calcularResultado()">
                                <span class="escala-nivel escala-b">B<br>Proceso</span>
                            </label>
                        </div>
                        <div class="escala-item">
                            <label>
                                <input type="radio" name="criterio${i}" value="A"
                                       onchange="calcularResultado()">
                                <span class="escala-nivel escala-a">A<br>Logro</span>
                            </label>
                        </div>
                        <div class="escala-item">
                            <label>
                                <input type="radio" name="criterio${i}" value="AD"
                                       onchange="calcularResultado()">
                                <span class="escala-nivel escala-ad">AD<br>Destacado</span>
                            </label>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function calcularResultado() {
            const respuestas = [];
            for (let i = 1; i <= 5; i++) {
                const valor = document.querySelector(`input[name="criterio${i}"]:checked`);
                if (valor) {
                    respuestas.push(valor.value);
                }
            }

            if (respuestas.length === 0) {
                document.getElementById('resultado-calif').textContent = '--';
                document.getElementById('resultado-pct').textContent = '0%';
                return;
            }

            const resultado = CalculosMINEDU.calcularCalificativo(respuestas);
            document.getElementById('resultado-calif').textContent = resultado.calificativo;
            document.getElementById('resultado-pct').textContent = resultado.porcentaje + '%';
        }

        function guardar() {
            const respuestas = [];
            for (let i = 1; i <= 5; i++) {
                const valor = document.querySelector(`input[name="criterio${i}"]:checked`);
                respuestas.push(valor ? valor.value : null);
            }

            const datos = {
                estudiante: document.getElementById('estudiante').value,
                competencia: document.getElementById('competencia').value,
                fecha: document.getElementById('fecha').value,
                docente: document.getElementById('docente').value,
                respuestas: respuestas,
                observaciones: document.getElementById('observaciones').value,
                resultado: {
                    calificativo: document.getElementById('resultado-calif').textContent,
                    porcentaje: parseInt(document.getElementById('resultado-pct').textContent)
                }
            };

            const json = JSON.stringify(datos, null, 2);
            descargarJSON('escala_valorativa.json', json);
            alert('✓ Escala valorativa guardada');
        }

        function limpiar() {
            if (confirm('¿Limpiar todos los datos?')) {
                document.getElementById('estudiante').value = '';
                document.getElementById('competencia').value = '';
                document.getElementById('docente').value = '';
                document.getElementById('observaciones').value = '';
                generarCriterios();
                document.getElementById('resultado-calif').textContent = '--';
                document.getElementById('resultado-pct').textContent = '0%';
            }
        }

        function cerrar() {
            if (confirm('¿Cerrar sin guardar?')) {
                window.close();
            }
        }

        function descargarJSON(nombre, contenido) {
            const blob = new Blob([contenido], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nombre;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
