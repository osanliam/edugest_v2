<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Forzar Recarga de Calificativos</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .box { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; }
        h1 { color: #333; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background: #4CAF50; color: white; }
        button:hover { background: #45a049; }
        .status { margin: 20px 0; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .info { background: #d1ecf1; color: #0c5460; }
        code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔄 Forzar Recarga de Calificativos</h1>
        
        <div id="msg" class="status"></div>
        
        <button onclick="forzarRecarga()">✅ Forzar Recarga de Datos</button>
        <button onclick="verificarDatos()" style="background: #2196F3; margin-left: 10px;">🔍 Verificar Datos</button>
        
        <div id="detalles" style="margin-top: 20px;"></div>
    </div>

    <script>
        const LS_KEY = 'ie_calificativos_v2';
        
        function forzarRecarga() {
            const datos = localStorage.getItem(LS_KEY);
            
            if (!datos) {
                alert('❌ No hay datos en localStorage');
                return;
            }
            
            try {
                const parsed = JSON.parse(datos);
                
                // Forzar recarga del localStorage (re-escribir los mismos datos)
                localStorage.setItem(LS_KEY, JSON.stringify(parsed));
                
                document.getElementById('msg').innerHTML = `
                    <strong>✅ Éxito:</strong> ${parsed.length} calificativos forzados a recargar.<br>
                    <strong>Próximo paso:</strong> Abre tu sistema y ve a la sección de Calificativos.
                `;
                document.getElementById('msg').className = 'status success';
                
                // Recargar sistema después de 2 segundos
                setTimeout(() => {
                    const urlSistema = window.location.origin;
                    window.location.href = urlSistema;
                }, 3000);
                
            } catch(e) {
                document.getElementById('msg').innerHTML = `<strong>❌ Error:</strong> ${e.message}`;
                document.getElementById('msg').className = 'status error';
            }
        }
        
        function verificarDatos() {
            const datos = localStorage.getItem(LS_KEY);
            let html = '<h3>Estado del localStorage:</h3>';
            
            if (datos) {
                try {
                    const parsed = JSON.parse(datos);
                    html += `<p><code>${LS_KEY}</code>: <strong>${parsed.length} calificativos</strong></p>`;
                    
                    const porComp = {};
                    parsed.forEach(c => {
                        porComp[c.competenciaId] = (porComp[c.competenciaId] || 0) + 1;
                    });
                    
                    html += '<p><strong>Por competencia:</strong><br>';
                    for (const [comp, count] of Object.entries(porComp)) {
                        html += `${comp}: ${count}<br>`;
                    }
                    html += '</p>';
                    
                } catch(e) {
                    html += `<p style="color: red;"><strong>❌ Error:</strong> ${e.message}</p>`;
                }
            } else {
                html += `<p style="color: red;"><strong>❌ No hay datos</strong> en <code>${LS_KEY}</code></p>`;
            }
            
            document.getElementById('detalles').innerHTML = html;
        }
        
        // Verificar al cargar
        verificarDatos();
    </script>
</body>
</html>
