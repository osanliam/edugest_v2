<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cargar Notas - Automático</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: rgba(0,0,0,0.9);
    border: 3px solid #0f0;
    border-radius: 10px;
    padding: 40px;
    max-width: 800px;
    width: 100%;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
  }
  h1 {
    color: #0f0;
    text-shadow: 0 0 10px #0f0;
    margin-bottom: 30px;
    text-align: center;
    font-size: 28px;
  }
  .status {
    background: #000;
    border: 1px solid #0f0;
    border-radius: 5px;
    padding: 20px;
    margin: 20px 0;
    min-height: 100px;
  }
  .status-line {
    margin: 8px 0;
    font-size: 14px;
  }
  .ok { color: #0f0; }
  .err { color: #f00; }
  .warn { color: #ff0; }
  .info { color: #0ff; }
  .progress-bar {
    width: 100%;
    height: 40px;
    background: #333;
    border: 2px solid #0f0;
    border-radius: 5px;
    overflow: hidden;
    margin: 20px 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0f0, #0f0cc);
    width: 0%;
    transition: width 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-weight: bold;
    font-size: 14px;
  }
  .button-group {
    display: flex;
    gap: 10px;
    margin: 20px 0;
    justify-content: center;
  }
  button {
    background: #0f0;
    color: #000;
    padding: 15px 30px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    transition: all 0.3s;
    font-family: 'Courier New', monospace;
  }
  button:hover:not(:disabled) { background: #0f0cc; transform: scale(1.05); }
  button:disabled { background: #666; cursor: not-allowed; opacity: 0.5; }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 20px 0;
  }
  .stat-box {
    background: rgba(0, 255, 0, 0.1);
    border: 1px solid #0f0;
    padding: 15px;
    border-radius: 5px;
    text-align: center;
  }
  .stat-number {
    font-size: 24px;
    font-weight: bold;
    color: #0f0;
  }
  .stat-label {
    font-size: 11px;
    color: #888;
    margin-top: 5px;
  }
  .loader {
    border: 3px solid #333;
    border-top: 3px solid #0f0;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container">
  <h1>📥 Cargar Notas al Sistema</h1>

  <div class="status" id="status">
    <div class="status-line"><span class="info">⏳</span> Inicializando...</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill">0%</div>
  </div>

  <div id="loader"></div>

  <div class="stats" id="stats"></div>

  <div class="button-group">
    <button id="btnCargar" onclick="iniciarCarga()">▶️ Cargar Notas</button>
    <button id="btnRecarga" onclick="location.reload()" style="display:none">🔄 Recargar Sistema</button>
    <button id="btnVerificar" onclick="verificarCarga()" style="display:none">✓ Verificar Carga</button>
  </div>
</div>

<script>
  const statusDiv = document.getElementById('status');
  const progressFill = document.getElementById('progressFill');
  const statsDiv = document.getElementById('stats');
  const loaderDiv = document.getElementById('loader');
  const btnCargar = document.getElementById('btnCargar');
  const btnRecarga = document.getElementById('btnRecarga');
  const btnVerificar = document.getElementById('btnVerificar');

  function log(tipo, mensaje) {
    const linea = document.createElement('div');
    linea.className = 'status-line';

    let icono = 'ℹ️';
    let clase = 'info';

    if (tipo === 'ok') { icono = '✓'; clase = 'ok'; }
    else if (tipo === 'err') { icono = '✗'; clase = 'err'; }
    else if (tipo === 'warn') { icono = '⚠'; clase = 'warn'; }

    linea.innerHTML = `<span class="${clase}">${icono}</span> ${mensaje}`;
    statusDiv.appendChild(linea);
    statusDiv.scrollTop = statusDiv.scrollHeight;
  }

  function setProgress(percent) {
    progressFill.style.width = percent + '%';
    progressFill.textContent = percent + '%';
  }

  function showStats(total, nuevas, actualizadas, periodo) {
    statsDiv.innerHTML = `
      <div class="stat-box">
        <div class="stat-number">${total}</div>
        <div class="stat-label">Total en Sistema</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">${nuevas}</div>
        <div class="stat-label">Nuevas</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">${actualizadas}</div>
        <div class="stat-label">Actualizadas</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">${periodo}</div>
        <div class="stat-label">Período</div>
      </div>
    `;
  }

  async function iniciarCarga() {
    statusDiv.innerHTML = '';
    btnCargar.disabled = true;
    loaderDiv.innerHTML = '<div class="loader"></div>';

    try {
      log('info', 'Descargando datos de notas...');
      setProgress(5);

      // Cargar el archivo JSON
      const response = await fetch('/notas_convertidas_remapeadas.json');
      if (!response.ok) {
        throw new Error(`Error HTTP ${response.status}: ${response.statusText}`);
      }

      const notas = await response.json();
      log('ok', `Datos cargados: ${notas.length} notas encontradas`);
      setProgress(20);

      if (!Array.isArray(notas) || notas.length === 0) {
        throw new Error('Los datos no son un array válido o están vacíos');
      }

      // Obtener notas existentes
      log('info', 'Leyendo notas existentes en el sistema...');
      const existentes = JSON.parse(localStorage.getItem('ie_calificativos_v2') || '[]');
      log('info', `Notas existentes: ${existentes.length}`);
      setProgress(25);

      // Procesar notas
      log('info', 'Procesando y cargando notas...');
      let cargadas = 0;
      let actualizadas = 0;
      const tamanoLote = 100;

      for (let i = 0; i < notas.length; i += tamanoLote) {
        const lote = notas.slice(i, i + tamanoLote);

        lote.forEach(nota => {
          const notaFormato = {
            alumnoId: nota.alumnoId,
            columnaId: nota.columnaId || 'col-' + Math.random().toString(36).slice(2, 9),
            marcados: Array.isArray(nota.marcados) ? nota.marcados : [],
            claves: Array.isArray(nota.claves) ? nota.claves : [],
            notaNumerica: typeof nota.notaNumerica === 'number' ? nota.notaNumerica : undefined,
            calificativo: nota.calificativo || 'C',
            esAD: nota.esAD === true,
            fecha: nota.fecha || new Date().toISOString(),
          };

          // Buscar existencia
          const idx = existentes.findIndex(c =>
            c.alumnoId === notaFormato.alumnoId &&
            c.columnaId === notaFormato.columnaId
          );

          if (idx >= 0) {
            existentes[idx] = notaFormato;
            actualizadas++;
          } else {
            existentes.push(notaFormato);
            cargadas++;
          }
        });

        // Progreso
        const porcentaje = 25 + Math.min(70, Math.round((i + tamanoLote) / notas.length * 70));
        setProgress(porcentaje);

        // Yield al navegador
        await new Promise(resolve => setTimeout(resolve, 10));
      }

      // Guardar en localStorage
      log('info', 'Guardando en localStorage...');
      localStorage.setItem('ie_calificativos_v2', JSON.stringify(existentes));
      setProgress(95);

      // Resultado
      log('ok', `Nuevas notas cargadas: ${cargadas}`);
      log('ok', `Notas actualizadas: ${actualizadas}`);
      log('ok', `Total en sistema: ${existentes.length}`);
      setProgress(100);

      loaderDiv.innerHTML = '';

      showStats(existentes.length, cargadas, actualizadas, 'Abril 2026');

      log('ok', '✨ ¡CARGA COMPLETADA EXITOSAMENTE!');
      log('info', 'Las notas están guardadas en tu navegador');

      btnVerificar.style.display = 'inline-block';
      btnRecarga.style.display = 'inline-block';

    } catch (error) {
      loaderDiv.innerHTML = '';
      log('err', `Error: ${error.message}`);
      log('warn', 'Posible causa: Archivo JSON no está en la raíz del proyecto');
      log('info', 'Alternativa: Copia manualmente notas_convertidas_remapeadas.json a la carpeta raíz');
      btnCargar.disabled = false;
    }
  }

  function verificarCarga() {
    const notas = JSON.parse(localStorage.getItem('ie_calificativos_v2') || '[]');
    statusDiv.innerHTML = '<div class="status-line"><span class="ok">✓</span> Verificación de carga:</div>';

    if (notas.length > 0) {
      log('ok', `${notas.length} notas presentes en localStorage`);
      log('ok', 'Las notas se cargarán automáticamente cuando abras Calificativos');
      log('info', 'Click "Recargar Sistema" para volver al módulo de calificativos');
    } else {
      log('err', 'No hay notas cargadas. Intenta nuevamente.');
    }
  }

  // Auto-iniciar si tiene parámetro
  window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('auto') === 'true') {
      setTimeout(() => iniciarCarga(), 1000);
    }
  });
</script>

</body>
</html>
